# STM32H723
# usb-Beacon_Beacon_RevH_<replace with your SN>-if00

[include mainsail.cfg]

[force_move]
enable_force_move: true

[screws_tilt_adjust]
screw1: 15,15
screw1_name: Front Left

screw2: 245,15
screw2_name: Front Right

screw3: 130,245
screw3_name: Rear Center

horizontal_move_z: 30
speed: 100

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_<replace with your SN>-if00
x_offset: 20
y_offset: 15
mesh_main_direction: x
mesh_runs: 2
contact_max_hotend_temperature: 300

[safe_z_home]
home_xy_position: 130, 130
z_hop: 3

[bed_mesh]
speed: 200
horizontal_move_z: 3
mesh_min: 20, 15
mesh_max: 250, 240
probe_count: 10, 10
algorithm: bicubic

[input_shaper]
shaper_type_x: 2hump_ei
shaper_freq_x: 42.4
shaper_type_y: mzv
shaper_freq_y: 34.6
    
# Driver0
[stepper_x]
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40
endstop_pin: !PG6
position_endstop: 0
position_max: 260
homing_speed: 50

# Driver1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
endstop_pin: !PG9
position_endstop: 0
position_max: 260
homing_speed: 50

# Driver2
[stepper_z]
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop
position_max: 260
position_min: -5
homing_speed: 5
second_homing_speed: 2
homing_retract_dist: 0 # beacon needs this to be set to 0

# Driver4
[extruder]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 33.5
max_extrude_only_distance: 120
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA0 # HE0
sensor_pin:  PF8 # PT100 # RTD CS (onboard MAX31865)
spi_bus: spi1 # ChatGPT Suggestion
rtd_nominal_r: 100
rtd_reference_r: 430
sensor_type: MAX31865 # MAX31865 is built into Octopus Pro board and the T0 header hooks up to it
min_temp: 0
max_temp: 450

[resonance_tester]
accel_chip: beacon
probe_points: 130, 130, 30

[filament_switch_sensor material_0]
switch_pin: PG12

# custom thermistor to match the "Bed NTC R25 122K Beta 4050" label
[thermistor fht_bed_122k_4050]
temperature1: 25
resistance1: 122000
beta: 4050

[heater_bed]
heater_pin: PB10
sensor_pin: PF3
sensor_type: fht_bed_122k_4050
control: pid
min_temp: 0
max_temp: 160

[heater_generic chamber]
heater_pin: PB0
sensor_type: Generic 3950
sensor_pin: PF5

min_temp: 0
max_temp: 90
max_power: 1.0

# Chamber temp can be slow to rise due to wall mounted temp sensor.
# This gives it more time. 
[verify_heater chamber]
check_gain_time: 1200 # In seconds
hysteresis: 5 # Margin for error in degrees C
heating_gain: 1 # In degrees C
max_error: 120

[heater_fan hotend_fan]
pin: PA8
heater: extruder
heater_temp: 45.0
fan_speed: 1.0

# Part Cooling Fan
[fan]
pin: PE5
kick_start_time: 0.5

[fan_generic filament_fan]
pin: PD12
kick_start_time: 0.5

[fan_generic led_bar]
pin: PD13
kick_start_time: 0
off_below: 0.0
shutdown_speed: 0

[delayed_gcode led_startup]
initial_duration: 1
gcode:
    SET_FAN_SPEED FAN=led_bar SPEED=1.0

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_150009000851323235363233-if00

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 1400
max_z_velocity: 15
max_z_accel: 100

########################################
# TMC2209 configuration
########################################

[tmc2209 stepper_x]
uart_pin: PC4
run_current: 0.800
stealthchop_threshold: 999999

[tmc2209 stepper_y]
uart_pin: PD11
run_current: 0.800
stealthchop_threshold: 999999

[tmc2209 stepper_z]
uart_pin: PC6
run_current: 0.650
stealthchop_threshold: 999999

[tmc2209 extruder]
uart_pin: PF2
run_current: 0.800
stealthchop_threshold: 999999

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE8, EXP1_2=PE7,
    EXP1_3=PE9, EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,    # Slot in the socket on this side
    EXP1_7=PE14, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PB1, EXP2_4=PA4,
    EXP2_5=PB2, EXP2_6=PA7,      # Slot in the socket on this side
    EXP2_7=PC15, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=PC5

[exclude_object]

# Macros
[gcode_macro BYPASS_HOME_CHECK]
description: Force Klipper to treat current position as homed
gcode:
    RESPOND PREFIX="INFO" MSG="Bypassing home check - setting position to 0,0,0"
    SET_KINEMATIC_POSITION X=0 Y=0 Z=0

# We're naming this M191 (wait) to make it work with Orca Slicer filament chamber temp controls
# However, we're setting it to behave more like M141 (no wait) so that we can continue
# to heat up the bed as well, and speed up the overall process
[gcode_macro M191]
description: Set chamber temperature and continue (Marlin-style).
gcode:
    {% if 'S' not in params %}
        {action_raise_error("M191 requires S parameter")}
    {% endif %}
    {% set t = params.S|float %}

    SET_HEATER_TEMPERATURE HEATER=chamber TARGET={t}
    RESPOND PREFIX="INFO" MSG="Chamber heating to {t}C (no wait)"

[gcode_macro M141]
description: Set chamber temperature (no wait)
gcode:
    {% if 'S' not in params %}
        {action_raise_error("M141 requires S parameter")}
    {% endif %}
    SET_HEATER_TEMPERATURE HEATER=chamber TARGET={params.S|float}

